<!DOCTYPE html>
<html lang="fr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wargame Ranked - Menu Principal</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="icon" href="WarGameDeck/Assets/Other/img/Logo_Ranked.png" />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <script src="discord_servers.js"></script>
    <style>
        :root {
            --bg-color: #0d1117;
            --card-bg: rgba(22, 27, 34, 0.8);
            --accent-color: #f0ad4e;
            --text-color: #c9d1d9;
            --text-muted: #8b949e;
            --border-color: #30363d;
            --hover-color: #21262d;
            --primary-gradient: linear-gradient(135deg, #f0ad4e 0%, #d98e2b 100%);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            line-height: 1.6;
            overflow-x: hidden;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            position: relative;
        }

        .video-background {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            z-index: -1;
            display: none;
        }

        .video-background.active {
            display: block;
        }

        /* Scrollbar styles - Cross-browser */
        /* Firefox */
        * {
            scrollbar-width: thin;
            scrollbar-color: var(--accent-color) var(--bg-color);
        }

        /* Chrome, Safari, Edge */
        *::-webkit-scrollbar {
            width: 8px;
            height: 8px;
        }

        *::-webkit-scrollbar-track {
            background: var(--bg-color);
        }

        *::-webkit-scrollbar-thumb {
            background: var(--accent-color);
            border-radius: 4px;
        }

        *::-webkit-scrollbar-thumb:hover {
            background: #d98e2b;
        }

        .container {
            max-width: 800px;
            width: 100%;
            padding: 2rem;
        }

        .logo-section {
            text-align: center;
            margin-bottom: 3rem;
        }

        .logo-section img {
            height: 220px;
            filter: drop-shadow(0 0 15px rgba(240, 173, 78, 0.4));
            margin-bottom: 1rem;
        }

        .logo-section h1 {
            font-size: 2.5rem;
            font-weight: 700;
            letter-spacing: -1px;
            color: var(--text-color);
        }

        .logo-section p {
            color: var(--text-muted);
            font-size: 1.1rem;
        }

        .menu-grid {
            display: grid;
            gap: 1.5rem;
        }

        .menu-card {
            background: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: 16px;
            padding: 2rem;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            cursor: pointer;
            position: relative;
            overflow: hidden;
        }

        .menu-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 4px;
            height: 100%;
            background: var(--accent-color);
            opacity: 0;
            transition: opacity 0.3s ease;
        }

        .menu-card:hover {
            transform: translateY(-5px);
            border-color: var(--accent-color);
            box-shadow: 0 15px 40px rgba(0, 0, 0, 0.5);
        }

        .menu-card:hover::before {
            opacity: 1;
        }

        .menu-card .icon {
            font-size: 2.5rem;
            margin-bottom: 1rem;
        }

        .menu-card h2 {
            font-size: 1.5rem;
            margin-bottom: 0.5rem;
            color: var(--text-color);
        }

        .menu-card p {
            color: var(--text-muted);
            font-size: 0.95rem;
        }

        .menu-card.primary {
            background: var(--primary-gradient);
            border: none;
        }

        .menu-card.primary h2,
        .menu-card.primary p {
            color: white;
        }

        .menu-card.primary::before {
            background: white;
        }

        /* Dropdown Styles */
        .dropdown-container {
            position: relative;
        }

        .dropdown-btn {
            width: 100%;
            text-align: center;
        }

        .dropdown-menu {
            display: none;
            position: absolute;
            top: calc(100% + 10px);
            left: 0;
            right: 0;
            background: var(--bg-color);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            padding: 0.5rem;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.8);
            z-index: 100;
            animation: fadeIn 0.2s ease;
        }

        .dropdown-container:hover .dropdown-menu {
            display: block;
        }

        .dropdown-item {
            display: flex;
            align-items: center;
            gap: 1rem;
            padding: 1rem;
            border-radius: 8px;
            transition: all 0.2s;
            text-decoration: none;
            color: var(--text-color);
        }

        .dropdown-item:hover {
            background: var(--hover-color);
            color: var(--accent-color);
        }

        .dropdown-item .server-icon {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background: #5865F2;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 600;
            color: white;
        }

        .dropdown-item .server-info {
            flex: 1;
        }

        .dropdown-item .server-name {
            font-weight: 600;
            display: block;
        }

        .dropdown-item .server-desc {
            font-size: 0.85rem;
            color: var(--text-muted);
        }

        .dropdown-item .arrow {
            opacity: 0;
            transition: all 0.2s;
            transform: translateX(-10px);
        }

        .dropdown-item:hover .arrow {
            opacity: 1;
            transform: translateX(0);
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(-10px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @media (max-width: 600px) {
            .logo-section h1 {
                font-size: 2rem;
            }

            .menu-card {
                padding: 1.5rem;
            }
        }
    </style>
</head>

<body>
    <video class="video-background" autoplay muted loop></video>
    <div class="container">
        <div class="logo-section">
            <img src="WarGameDeck/Assets/Other/img/Logo_Ranked.png" alt="Logo WarGame Ranked">
            <h1>Wargame Ranked</h1>

        <div class="menu-grid">
            <!-- Decks -->
            <div class="menu-card" onclick="window.location.href='WarGameDeck/index.html'">
                <div class="icon">
                    <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                        stroke-linecap="round" stroke-linejoin="round">
                        <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path>
                        <polyline points="14 2 14 8 20 8"></polyline>
                        <line x1="16" y1="13" x2="8" y2="13"></line>
                        <line x1="16" y1="17" x2="8" y2="17"></line>
                        <polyline points="10 9 9 9 8 9"></polyline>
                    </svg>
                </div>
                <h2>Decks</h2>
                <p>Accéder à l'index des decks et compositions</p>
            </div>

            <!-- Jouer -->
            <div class="menu-card" onclick="window.location.href='https://discord.gg/7bRbdTP8tt'">
                <div class="icon">
                    <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                        stroke-linecap="round" stroke-linejoin="round">
                        <rect x="2" y="6" width="20" height="12" rx="2"></rect>
                        <path d="M6 12h4"></path>
                        <path d="M8 10v4"></path>
                        <circle cx="17" cy="12" r="1.5"></circle>
                    </svg>
                </div>
                <h2>Jouer</h2>
                <p>Rejoindre le salon recherche de joueurs</p>
            </div>

            <!-- Discord Dropdown -->
            <div class="dropdown-container">
                <div class="menu-card dropdown-btn">
                    <div class="icon">
                        <svg width="48" height="48" viewBox="0 0 24 24" fill="currentColor">
                            <path
                                d="M20.317 4.37a19.791 19.791 0 0 0-4.885-1.515.074.074 0 0 0-.079.037c-.21.375-.444.864-.608 1.25a18.27 18.27 0 0 0-5.487 0 12.64 12.64 0 0 0-.617-1.25.077.077 0 0 0-.079-.037A19.736 19.736 0 0 0 3.677 4.37a.07.07 0 0 0-.032.027C.533 9.046-.32 13.58.099 18.057a.082.082 0 0 0 .031.057 19.9 19.9 0 0 0 5.993 3.03.078.078 0 0 0 .084-.028c.462-.63.874-1.295 1.226-1.994a.076.076 0 0 0-.041-.106 13.107 13.107 0 0 1-1.872-.892.077.077 0 0 1-.008-.128 10.2 10.2 0 0 0 .372-.292.074.074 0 0 1 .077-.01c3.928 1.793 8.18 1.793 12.062 0a.074.074 0 0 1 .078.01c.12.098.246.198.373.292a.077.077 0 0 1-.006.127 12.299 12.299 0 0 1-1.873.892.077.077 0 0 0-.041.107c.36.698.772 1.362 1.225 1.993a.076.076 0 0 0 .084.028 19.839 19.839 0 0 0 6.002-3.03.077.077 0 0 0 .032-.054c.5-5.177-.838-9.674-3.549-13.66a.061.061 0 0 0-.031-.03zM8.02 15.33c-1.183 0-2.157-1.085-2.157-2.419 0-1.333.956-2.419 2.157-2.419 1.21 0 2.176 1.096 2.157 2.42 0 1.333-.956 2.418-2.157 2.418zm7.975 0c-1.183 0-2.157-1.085-2.157-2.419 0-1.333.955-2.419 2.157-2.419 1.21 0 2.176 1.096 2.157 2.42 0 1.333-.946 2.418-2.157 2.418z" />
                        </svg>
                    </div>
                    <h2>Discord</h2>
                    <p>Rejoindre nos serveurs communautaires</p>
                </div>
                <div class="dropdown-menu" id="discord-dropdown">
                    <!-- Les serveurs seront chargés dynamiquement depuis discord_servers.js -->
                </div>
            </div>
        </div>
    </div>

    <script>
        function escapeHtml(str) {
            if (str == null) return '';
            const div = document.createElement('div');
            div.textContent = String(str);
            return div.innerHTML;
        }

        function loadDiscordServers() {
            const dropdown = document.getElementById('discord-dropdown');
            if (typeof DISCORD_SERVERS === 'undefined') {
                dropdown.innerHTML = '<div style="padding: 1rem; color: var(--text-muted);">Erreur: Fichier discord_servers.js non trouvé</div>';
                return;
            }

            const discordLogo = `<svg width="24" height="24" viewBox="0 0 24 24" fill="currentColor">
                <path d="M20.317 4.37a19.791 19.791 0 0 0-4.885-1.515.074.074 0 0 0-.079.037c-.21.375-.444.864-.608 1.25a18.27 18.27 0 0 0-5.487 0 12.64 12.64 0 0 0-.617-1.25.077.077 0 0 0-.079-.037A19.736 19.736 0 0 0 3.677 4.37a.07.07 0 0 0-.032.027C.533 9.046-.32 13.58.099 18.057a.082.082 0 0 0 .031.057 19.9 19.9 0 0 0 5.993 3.03.078.078 0 0 0 .084-.028c.462-.63.874-1.295 1.226-1.994a.076.076 0 0 0-.041-.106 13.107 13.107 0 0 1-1.872-.892.077.077 0 0 1-.008-.128 10.2 10.2 0 0 0 .372-.292.074.074 0 0 1 .077-.01c3.928 1.793 8.18 1.793 12.062 0a.074.074 0 0 1 .078.01c.12.098.246.198.373.292a.077.077 0 0 1-.006.127 12.299 12.299 0 0 1-1.873.892.077.077 0 0 0-.041.107c.36.698.772 1.362 1.225 1.993a.076.076 0 0 0 .084.028 19.839 19.839 0 0 0 6.002-3.03.077.077 0 0 0 .032-.054c.5-5.177-.838-9.674-3.549-13.66a.061.061 0 0 0-.031-.03zM8.02 15.33c-1.183 0-2.157-1.085-2.157-2.419 0-1.333.956-2.419 2.157-2.419 1.21 0 2.176 1.096 2.157 2.42 0 1.333-.956 2.418-2.157 2.418zm7.975 0c-1.183 0-2.157-1.085-2.157-2.419 0-1.333.955-2.419 2.157-2.419 1.21 0 2.176 1.096 2.157 2.42 0 1.333-.946 2.418-2.157 2.418z"/>
            </svg>`;

            dropdown.innerHTML = DISCORD_SERVERS.map(server => `
                <a href="${escapeHtml(server.url)}" target="_blank" class="dropdown-item">
                    <div class="server-icon">${discordLogo}</div>
                    <div class="server-info">
                        <span class="server-name">${escapeHtml(server.name)}</span>
                        <span class="server-desc">${escapeHtml(server.description)}</span>
                    </div>
                    <span class="arrow">→</span>
                </a>
            `).join('');
        }

        // Load servers on page load
        loadDiscordServers();

        // Config embedded to avoid CORS issues
        const config = {
            "credits": {
                "types": [
                    {
                        "id": "infanterie",
                        "name": "Crédits Infanterie",
                        "icon": "🪖",
                        "color": "#FFFFFF"
                    },
                    {
                        "id": "blindes",
                        "name": "Crédits Blindés",
                        "icon": "🛡️",
                        "color": "#D11B1B"
                    },
                    {
                        "id": "mecanises",
                        "name": "Crédits Mécanisés",
                        "icon": "🚛",
                        "color": "#B06EFF"
                    },
                    {
                        "id": "motorises",
                        "name": "Crédits Motorisés",
                        "icon": "🚗",
                        "color": "#A1A1A1"
                    },
                    {
                        "id": "support",
                        "name": "Crédits Support",
                        "icon": "🚑",
                        "color": "#70CC41"
                    },
                    {
                        "id": "aeriens",
                        "name": "Crédits Aériens",
                        "icon": "✈️",
                        "color": "#A6DEFF"
                    },
                    {
                        "id": "invitation",
                        "name": "Crédits d'Invitations",
                        "icon": "✉️",
                        "color": "#FF8F00"
                    }
                ]
            },
            "MainPageVideo": {
                "Path": "WarGameRanked.mp4",
                "Active": true
            }
        };

        // Check config for video setting
        function checkVideoConfig() {
            console.log('Config file content:', config);
            
            if (config.MainPageVideo && config.MainPageVideo.Active) {
                const video = document.querySelector('.video-background');
                if (video) {
                    video.src = config.MainPageVideo.Path;
                    video.classList.add('active');
                    console.log('Video activated with path:', config.MainPageVideo.Path);
                    
                    // Add video event listeners for debugging
                    video.addEventListener('loadstart', () => console.log('Video loading started'));
                    video.addEventListener('canplay', () => console.log('Video can play'));
                    video.addEventListener('error', (e) => console.error('Video error:', e));
                }
            } else {
                console.log('Video not active in config');
            }
        }

        // Check video config on page load
        checkVideoConfig();
    </script>
</body>

</html>
