<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wargame Ranked - Vérification de Deck</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script src="../Assets/vehicles.js"></script>
    <script src="doctrines.js"></script>
</head>
<body>
    <header>
        <div class="header-title">
            <img src="../Assets/Other/img/Logo_Ranked.png" alt="Logo">
            <h1>Vérification de Deck</h1>
        </div>
        <div class="header-actions">
            <a href="index.html" class="back-btn">← Retour au Builder</a>
        </div>
    </header>

    <main>
        <div id="verify-area" class="animate-in">
            <div style="margin-bottom: 40px;">
                <h2 style="font-size: 2rem; color: var(--accent);">Vérifiez l'intégrité d'un Deck</h2>
                <p style="color: var(--text-secondary);">Déposez votre fichier .json pour vérifier s'il est valide.</p>
            </div>

            <label class="file-drop" id="drop-zone">
                <input type="file" id="verify-input" style="display: none;" onchange="handleVerify(event)">
                <div id="drop-content">
                    <img src="../Assets/Other/img/archive-svgrepo-com.svg" style="width: 64px; opacity: 0.3; margin-bottom: 20px;">
                    <p>Cliquez ou glissez-déposez le fichier ici</p>
                </div>
            </label>

            <!-- Vehicle Details Modal -->
            <div id="vehicle-modal" class="modal-overlay" style="display: none;" onclick="closeVehicleModal()">
                <div class="modal-content animate-in" style="max-width: 500px;" onclick="event.stopPropagation()">
                    <h3 id="modal-vehicle-name" style="margin-top: 0; color: var(--accent);">Détails du Véhicule</h3>
                    <div id="modal-vehicle-details" style="margin-top: 20px;">
                        <!-- Details will be injected here -->
                    </div>
                    <button class="primary-btn" style="margin-top: 20px; width: 100%;" onclick="closeVehicleModal()">Fermer</button>
                </div>
            </div>

            <div id="result-area" style="display: none; margin-top: 40px; text-align: left;">
                <div id="status-badge" class="status-badge">VALIDE</div>
                
                <div class="panel" style="padding: 0; overflow: hidden; border: 1px solid var(--border); background: var(--bg-card); border-radius: 12px;">
                    <div style="padding: 25px; border-bottom: 1px solid var(--border); background: rgba(255,255,255,0.02);">
                        <h3 id="deck-title" style="margin: 0; color: var(--accent); font-size: 1.5rem;">Nom du Deck</h3>
                        <p id="deck-meta" style="color: var(--text-secondary); font-size: 0.9rem; margin-top: 8px;"></p>
                    </div>

                    <div id="credits-section" style="padding: 25px; border-bottom: 1px solid var(--border); background: rgba(255,255,255,0.01);">
                        <h4 style="margin-top: 0; margin-bottom: 15px; font-size: 1rem; color: var(--text-secondary); text-transform: uppercase; letter-spacing: 1px;">Crédits Utilisés</h4>
                        <div id="credits-bars" class="credits-bars">
                            <!-- Credits bars will be inserted here -->
                        </div>
                    </div>

                    <div style="padding: 25px;">
                        <h4 style="margin-top: 0; margin-bottom: 20px; font-size: 1.1rem; color: var(--text-secondary); text-transform: uppercase; letter-spacing: 1px;">Unités du Deck</h4>
                        <div id="deck-units" class="verify-grid">
                            <!-- Units list -->
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <style>
        .verify-grid {
            display: grid; 
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); 
            gap: 15px;
        }
        .verify-unit-card {
            background: rgba(255,255,255,0.03);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 10px;
            padding: 12px;
            display: flex;
            align-items: center;
            gap: 15px;
            transition: all 0.3s ease;
        }
        .verify-unit-card:hover {
            background: rgba(255,255,255,0.06);
            transform: translateY(-2px);
        }
        .verify-unit-card img {
            width: 60px;
            height: 35px;
            border-radius: 4px;
            object-fit: cover;
            box-shadow: 0 4px 8px rgba(0,0,0,0.3);
        }
        .verify-unit-info {
            flex: 1;
        }
        .verify-unit-name {
            display: block;
            font-weight: 600;
            font-size: 0.95rem;
            color: var(--text);
        }
        .verify-unit-country {
            font-size: 0.75rem;
            color: var(--text-secondary);
        }
        .verify-unit-credits {
            font-size: 0.7rem;
            color: var(--accent);
            margin-top: 4px;
            font-weight: 600;
            display: flex;
            gap: 5px;
            align-items: center;
        }

        .total-cost-badge {
            background: rgba(240, 173, 78, 0.1);
            color: var(--accent);
            padding: 2px 6px;
            border-radius: 4px;
            border: 1px solid var(--accent);
        }

        .emport-label {
            font-size: 0.65rem;
            color: var(--text-secondary);
            background: rgba(255, 255, 255, 0.05);
            padding: 2px 6px;
            border-radius: 4px;
        }

        .credits-bars {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .credit-bar-item {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .credit-bar-label {
            width: 50px;
            font-size: 0.8rem;
            font-weight: 600;
            color: var(--text);
        }

        .credit-bar-track {
            flex: 1;
            height: 8px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 4px;
            overflow: hidden;
        }

        .credit-bar-fill {
            height: 100%;
            background: var(--accent);
            border-radius: 4px;
            transition: width 0.3s ease;
        }

        .credit-bar-fill.overflow {
            background: var(--danger);
        }

        .credit-bar-value {
            width: 60px;
            font-size: 0.8rem;
            color: var(--text-secondary);
            text-align: right;
        }

        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.8);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1000;
        }

        .modal-content {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 30px;
            max-width: 90%;
            max-height: 90vh;
            overflow-y: auto;
        }

        .vehicle-detail-section {
            margin-bottom: 20px;
            padding-bottom: 15px;
            border-bottom: 1px solid var(--border);
        }

        .vehicle-detail-section:last-child {
            border-bottom: none;
            margin-bottom: 0;
        }

        .vehicle-detail-title {
            font-size: 0.9rem;
            font-weight: 600;
            color: var(--accent);
            margin-bottom: 10px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .credit-detail-item {
            display: flex;
            justify-content: space-between;
            padding: 8px 0;
            font-size: 0.85rem;
        }

        .credit-detail-label {
            color: var(--text-secondary);
        }

        .credit-detail-value {
            color: var(--text);
            font-weight: 600;
        }

        .emport-option {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 8px;
            padding: 12px;
            margin-bottom: 10px;
        }

        .emport-option.selected {
            border-color: var(--accent);
            background: rgba(240, 173, 78, 0.1);
        }

        .emport-option-title {
            font-weight: 600;
            color: var(--text);
            margin-bottom: 5px;
        }

        .emport-option-cost {
            font-size: 0.8rem;
            color: var(--text-secondary);
        }

        .verify-unit-card {
            cursor: pointer;
        }
    </style>

    <script>
        // ─── Configuration API Cloudflare Workers ───────────────────────────────────
        // L'URL de votre API Cloudflare Workers qui génère les signatures SHA-256.
        // La vérification utilise la même API que l'export pour garantir l'intégrité.
        const SIGNATURE_API_URL = "https://wargame-api.gougele222.workers.dev";

        // ─── Helper XSS ───────────────────────────────────────────────
        function escapeHtml(str) {
            if (str == null) return '';
            const div = document.createElement('div');
            div.textContent = String(str);
            return div.innerHTML;
        }

        function translateType(type) {
            const map = {
                infantry: 'INF',
                armor: 'BLI',
                mechanized: 'MEC',
                motorized: 'MOT',
                support: 'SUP',
                plane: 'AIR',
                invitation: 'INV'
            };
            return map[type] || type;
        }

        function getVehicleImage(u) {
            // Try to find in latest data
            let latest = null;
            if (window.VEHICLES_DATA && window.VEHICLES_DATA[u.country]) {
                latest = window.VEHICLES_DATA[u.country].find(v => v.name === u.name);
            }

            const v = latest || u;
            let path = v.image_path || v.thumbnail || '';

            if (path && !path.startsWith('http') && !path.startsWith('../')) {
                path = '../Assets/' + path;
            }
            if (v.thumbnail && v.thumbnail.includes('imgur.com') && v.image_path) {
                path = '../Assets/' + v.image_path;
            }
            return path || '../Assets/Other/img/Logo_Ranked.png';
        }

        function updateCreditsBars(units, doctrineKey) {
            const doctrine = DOCTRINES[doctrineKey];
            if (!doctrine) return;

            const totals = { infantry: 0, armor: 0, mechanized: 0, motorized: 0, support: 0, plane: 0, invitation: 0 };

            units.forEach(u => {
                const base = u.baseCredits || u.credits || {};
                const emport = u.selectedEmport || { infantry: 0, armor: 0, mechanized: 0, motorized: 0, support: 0, plane: 0, invitation: 0, _text: '' };

                for (const type in totals) {
                    if (typeof base[type] === 'number') {
                        totals[type] += (base[type] || 0) + (emport[type] || 0);
                    }
                }
            });

            const creditsBarsContainer = document.getElementById('credits-bars');
            creditsBarsContainer.innerHTML = '';

            const creditTypes = [
                { key: 'infantry', label: 'INF' },
                { key: 'armor', label: 'ARM' },
                { key: 'mechanized', label: 'MEC' },
                { key: 'motorized', label: 'MOT' },
                { key: 'support', label: 'SUP' },
                { key: 'plane', label: 'AIR' }
            ];

            creditTypes.forEach(({ key, label }) => {
                const max = doctrine[key] !== undefined ? doctrine[key] : 0;
                const used = totals[key];

                if (max === 0 && used === 0) return;

                const percentage = max > 0 ? Math.min((used / max) * 100, 100) : 0;
                const isOverflow = max > 0 && used > max;

                const item = document.createElement('div');
                item.className = 'credit-bar-item';
                item.innerHTML = `
                    <span class="credit-bar-label">${label}</span>
                    <div class="credit-bar-track">
                        <div class="credit-bar-fill ${isOverflow ? 'overflow' : ''}" style="width: ${percentage}%"></div>
                    </div>
                    <span class="credit-bar-value">${used} / ${max}</span>
                `;
                creditsBarsContainer.appendChild(item);
            });
        }

        function showVehicleDetails(unit) {
            // Try to find latest data
            let latest = null;
            if (window.VEHICLES_DATA && window.VEHICLES_DATA[unit.country]) {
                latest = window.VEHICLES_DATA[unit.country].find(v => v.name === unit.name);
            }
            const vehicle = latest || unit;

            document.getElementById('modal-vehicle-name').innerText = vehicle.name;

            const detailsContainer = document.getElementById('modal-vehicle-details');
            detailsContainer.innerHTML = '';

            // Base credits section
            const base = vehicle.baseCredits || vehicle.credits || {};
            const baseSection = document.createElement('div');
            baseSection.className = 'vehicle-detail-section';
            baseSection.innerHTML = '<div class="vehicle-detail-title">Crédits de Base</div>';

            const creditTypes = [
                { key: 'infantry', label: 'Infanterie' },
                { key: 'armor', label: 'Blindés' },
                { key: 'mechanized', label: 'Mécanisés' },
                { key: 'motorized', label: 'Motorisés' },
                { key: 'support', label: 'Support' },
                { key: 'plane', label: 'Aériens' },
                { key: 'invitation', label: 'Invitations' }
            ];

            creditTypes.forEach(({ key, label }) => {
                const value = base[key] || 0;
                if (value > 0) {
                    const item = document.createElement('div');
                    item.className = 'credit-detail-item';
                    item.innerHTML = `
                        <span class="credit-detail-label">${label}</span>
                        <span class="credit-detail-value">${value}</span>
                    `;
                    baseSection.appendChild(item);
                }
            });

            if (baseSection.children.length > 1) {
                detailsContainer.appendChild(baseSection);
            }

            // Emport options section
            const emport = unit.selectedEmport || { infantry: 0, armor: 0, mechanized: 0, motorized: 0, support: 0, plane: 0, invitation: 0, _text: '' };
            const emportOptions = vehicle.emportOptions || [];

            if (emportOptions.length > 0) {
                const emportSection = document.createElement('div');
                emportSection.className = 'vehicle-detail-section';
                emportSection.innerHTML = '<div class="vehicle-detail-title">Options d\'Emport</div>';

                // Show "Sans emport" option
                const noneOption = document.createElement('div');
                noneOption.className = 'emport-option';
                const isNoneSelected = Object.values(emport).every(v => v === 0 || v === '');
                noneOption.classList.toggle('selected', isNoneSelected);
                noneOption.innerHTML = `
                    <div class="emport-option-title">Pas d'emport supplémentaire</div>
                    <div class="emport-option-cost">Gratuit</div>
                `;
                emportSection.appendChild(noneOption);

                emportOptions.forEach((opt, idx) => {
                    const optDiv = document.createElement('div');
                    optDiv.className = 'emport-option';

                    // Check if this option is selected
                    const isSelected = opt._text === emport._text;
                    optDiv.classList.toggle('selected', isSelected);

                    const costStr = Object.entries(opt)
                        .filter(([key, val]) => val > 0 && !key.startsWith('_'))
                        .map(([type, val]) => `${val} ${translateType(type)}`)
                        .join(', ') || 'Gratuit';

                    const optTitle = opt._text || `Option ${idx + 1}`;
                    optDiv.innerHTML = `
                        <div class="emport-option-title">${escapeHtml(optTitle)}</div>
                        <div class="emport-option-cost">${escapeHtml(costStr)}</div>
                    `;
                    emportSection.appendChild(optDiv);
                });

                detailsContainer.appendChild(emportSection);
            }

            // Selected emport section
            if (emport && (emport._text || Object.values(emport).some(v => v > 0))) {
                const selectedSection = document.createElement('div');
                selectedSection.className = 'vehicle-detail-section';
                selectedSection.innerHTML = '<div class="vehicle-detail-title">Emport Sélectionné</div>';

                if (emport._text) {
                    const titleDiv = document.createElement('div');
                    titleDiv.className = 'credit-detail-item';
                    titleDiv.innerHTML = `
                        <span class="credit-detail-label">Option</span>
                        <span class="credit-detail-value">${escapeHtml(emport._text)}</span>
                    `;
                    selectedSection.appendChild(titleDiv);
                }

                creditTypes.forEach(({ key, label }) => {
                    const value = emport[key] || 0;
                    if (value > 0) {
                        const item = document.createElement('div');
                        item.className = 'credit-detail-item';
                        item.innerHTML = `
                            <span class="credit-detail-label">${label}</span>
                            <span class="credit-detail-value">+${value}</span>
                        `;
                        selectedSection.appendChild(item);
                    }
                });

                detailsContainer.appendChild(selectedSection);
            }

            document.getElementById('vehicle-modal').style.display = 'flex';
        }

        function closeVehicleModal() {
            document.getElementById('vehicle-modal').style.display = 'none';
        }

        async function handleVerify(event) {
            const file = event.target.files[0];
            if (!file) return;

            const reader = new FileReader();
            reader.onload = async (e) => {
                try {
                    const data = JSON.parse(e.target.result);
                    const { signature, ...rest } = data;

                    // Envoyer le deck à l'API pour obtenir la signature attendue
                    const response = await fetch(SIGNATURE_API_URL, {
                        method: 'POST',
                        headers: {
                            'Content-Type': 'application/json'
                        },
                        body: JSON.stringify(rest)
                    });

                    const resultArea = document.getElementById('result-area');
                    const badge = document.getElementById('status-badge');
                    
                    resultArea.style.display = 'block';
                    
                    if (response.ok) {
                        const { signature: expectedSignature } = await response.json();
                        
                        if (signature === expectedSignature) {
                            badge.innerText = "✓ DECK VALIDE";
                            badge.className = "status-badge status-valid";
                        } else {
                            badge.innerText = "⚠ DECK MODIFIÉ / INVALIDE";
                            badge.className = "status-badge status-invalid";
                        }
                    } else {
                        badge.innerText = "⚠ ERREUR API";
                        badge.className = "status-badge status-invalid";
                    }

                    document.getElementById('deck-title').innerText = data.name;
                    document.getElementById('deck-meta').innerText = `Doctrine: ${DOCTRINES[data.doctrine]?.name || data.doctrine} | Date: ${new Date(data.timestamp).toLocaleString()}`;

                    // Update credits bars
                    updateCreditsBars(data.units, data.doctrine);

                    const unitsList = document.getElementById('deck-units');
                    unitsList.innerHTML = '';
                    data.units.forEach(u => {
                        const div = document.createElement('div');
                        div.className = 'verify-unit-card';
                        div.onclick = () => showVehicleDetails(u);
                        
                        // Handle both old and new formats
                        const base = u.baseCredits || u.credits || {};
                        const emport = u.selectedEmport || { infantry: 0, armor: 0, mechanized: 0, motorized: 0, support: 0, plane: 0, invitation: 0, _text: '' };

                        const totalCredits = {};
                        for (const type in base) {
                            if (typeof base[type] === 'number') {
                                totalCredits[type] = (base[type] || 0) + (emport[type] || 0);
                            }
                        }

                        const costStr = Object.entries(totalCredits)
                            .filter(([key, val]) => val > 0 && !key.startsWith('_'))
                            .map(([type, val]) => `${val} ${translateType(type)}`)
                            .join(' + ');

                        const thumbUrl = getVehicleImage(u);
                        
                        div.innerHTML = `
                            <img src="${escapeHtml(thumbUrl)}" alt="${escapeHtml(u.name)}">
                            <div class="verify-unit-info">
                                <span class="verify-unit-name">${escapeHtml(u.name)}</span>
                                <span class="verify-unit-country">${escapeHtml(u.country)}</span>
                                <div class="verify-unit-credits">
                                    <span class="total-cost-badge">${escapeHtml(costStr)}</span>
                                    ${emport._text ? `<span class="emport-label">${escapeHtml(emport._text)}</span>` : ''}
                                </div>
                            </div>
                        `;
                        unitsList.appendChild(div);
                    });

                } catch (err) {
                    alert("Erreur lors de l'analyse du fichier : " + err.message);
                }
            };
            reader.readAsText(file);
        }

        // Drag and drop logic
        const dropZone = document.getElementById('drop-zone');
        dropZone.addEventListener('dragover', (e) => { e.preventDefault(); dropZone.style.borderColor = 'var(--accent)'; });
        dropZone.addEventListener('dragleave', () => { dropZone.style.borderColor = 'var(--border)'; });
        dropZone.addEventListener('drop', (e) => {
            e.preventDefault();
            dropZone.style.borderColor = 'var(--border)';
            const file = e.dataTransfer.files[0];
            if (file) {
                const input = document.getElementById('verify-input');
                const dt = new DataTransfer();
                dt.items.add(file);
                input.files = dt.files;
                handleVerify({ target: { files: dt.files } });
            }
        });
    </script>
</body>
</html>
